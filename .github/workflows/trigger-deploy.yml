name: Trigger private deploy

on:
  workflow_run:
    workflows:
      - Tests
    types:
      - completed

permissions:
  contents: read

jobs:
  trigger-deploy:
    name: Notify private deployment repository

    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'

    runs-on: ubuntu-latest

    steps:
      - name: Trigger private deployment
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_REPO_TOKEN }}
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
          SOURCE_BRANCH: ${{ github.event.workflow_run.head_branch }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail

          jq -n \
            --arg event_type "deploy" \
            --arg sha "$SOURCE_SHA" \
            --arg ref "$SOURCE_BRANCH" \
            --arg repository "$SOURCE_REPOSITORY" \
            --arg run_id "$SOURCE_RUN_ID" \
            '{
              event_type: $event_type,
              client_payload: {
                sha: $sha,
                ref: $ref,
                repository: $repository,
                test_run_id: $run_id
              }
            }' > payload.json

          curl \
            --fail-with-body \
            --silent \
            --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data @payload.json \
            https://api.github.com/repos/DrA1ex/tg-meme-stealer-deploy/dispatches

          echo "Private deployment requested for ${SOURCE_SHA:0:12}"
