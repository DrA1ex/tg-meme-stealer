name: Trigger private deploy

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger private deployment
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_REPO_TOKEN }}
          SOURCE_SHA: ${{ github.sha }}
          SOURCE_REF: ${{ github.ref_name }}
          SOURCE_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          curl --fail-with-body \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/DrA1ex/tg-meme-stealer-deploy/dispatches \
            --data "$(jq -n \
              --arg event_type "deploy" \
              --arg sha "$SOURCE_SHA" \
              --arg ref "$SOURCE_REF" \
              --arg repository "$SOURCE_REPOSITORY" \
              '{
                event_type: $event_type,
                client_payload: {
                  sha: $sha,
                  ref: $ref,
                  repository: $repository
                }
              }'
            )"
